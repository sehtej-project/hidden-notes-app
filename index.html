  title>Secret Notes</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Overlay shown during screen sharing -->
  <div class="screen-share-overlay" id="screenShareOverlay" role="alert" aria-live="assertive">
    <span>🔒</span>
    <p>Notes hidden during screen share</p>
    <small>Your content is protected</small>
  </div>

  <div id="app">
    <header>

    </header>

    <main>
      <aside id="notesList" aria-label="Notes list"></aside>

      <section id="editorPanel" aria-label="Note editor">
        <div id="editorPlaceholder">
          <p>📝 Select a note or create a new one</p>
        </div>

        <div id="editor" class="hidden" role="form" aria-label="Edit note">
          <input
            type="text"
            id="noteTitle"
            placeholder="Note title..."
            aria-label="Note title"
            maxlength="200"
          />
          <div
            id="noteContent"
            contenteditable="true"
            role="textbox"
            aria-multiline="true"
            aria-label="Note content"
            spellcheck="true"
          ></div>
          <div class="editor-footer">
            <span id="lastSaved" aria-live="polite"></span>
            <span id="unsavedIndicator" class="unsaved hidden">● Unsaved</span>
            <button id="deleteNoteBtn" class="btn-danger" aria-label="Delete note">
              🗑 Delete
            </button>
            <button id="saveNoteBtn" aria-label="Save note">💾 Save</button>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
